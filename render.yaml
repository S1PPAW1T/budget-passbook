services:
  - type: web
    name: budget-passbook-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npx --workspace=apps/api prisma generate && npm run build --workspace=apps/api
    startCommand: npm run db:deploy --workspace=apps/api && npm run start --workspace=apps/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
