version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: budget_passbook_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: passbook
      POSTGRES_PASSWORD: passbook_secret
      POSTGRES_DB: budget_passbook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
